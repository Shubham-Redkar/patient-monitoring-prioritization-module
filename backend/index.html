<!doctype html>
<html>
  <head>
    <title>Sepsis Monitoring Test</title>

    <style>
      body {
        font-family: Arial;
        margin: 40px;
      }

      .alert {
        padding: 12px;
        margin-top: 15px;
        font-weight: bold;
        border-radius: 6px;
      }

      .high {
        background-color: #fff3cd;
        color: #856404;
      }

      .critical {
        background-color: #f8d7da;
        color: #721c24;
      }

      .resolved {
        background-color: #d4edda;
        color: #155724;
      }

      button {
        padding: 8px 12px;
        margin-top: 10px;
        cursor: pointer;
      }

      pre {
        background: #f4f4f4;
        padding: 10px;
      }

      .doctor-row {
        margin-top: 10px;
      }

      .doctor-row label {
        font-weight: bold;
        margin-right: 6px;
      }
    </style>
  </head>

  <body>
    <h2>Sepsis Monitoring Test Interface</h2>

    <label>Patient ID:</label>
    <input type="number" id="patientId" value="1" />

    <!-- FIX 4: Added doctor name input field -->
    <div class="doctor-row">
      <label>Doctor Name:</label>
      <input
        type="text"
        id="doctorName"
        value=""
        placeholder="Enter doctor name"
      />
    </div>

    <br />

    <label>Hour:</label>

    <!-- FIX 2: Separated oninput (display only) from onchange (fetch on release) -->
    <input
      type="range"
      id="hourSlider"
      min="0"
      max="72"
      value="0"
      oninput="updateHour()"
      onchange="fetchPrediction()"
    />

    <span id="hourValue">0</span>

    <hr />

    <h3>Alert Status</h3>

    <div id="alertBox"></div>

    <button id="ackButton" onclick="acknowledgeAlert()" style="display: none">
      Acknowledge Alert
    </button>

    <hr />

    <h3>Explanation</h3>

    <p id="explanationText"></p>

    <hr />

    <h3>Prediction Data</h3>

    <pre id="result"></pre>

    <hr />

    <h3>Upload CSV Dataset</h3>

    <input type="file" id="csvFile" />
    <button onclick="uploadCSV()">Upload CSV</button>

    <pre id="uploadResult"></pre>

    <script>
      function updateHour() {
        const hour = document.getElementById("hourSlider").value;
        document.getElementById("hourValue").innerText = hour;
      }

      async function fetchPrediction() {
        const patientId = document.getElementById("patientId").value;
        const hour = document.getElementById("hourSlider").value;

        const url = `http://localhost:8000/api/v1/patients/${patientId}/predict?hour=${hour}`;

        try {
          const response = await fetch(url);

          if (!response.ok) {
            throw new Error("Backend returned error " + response.status);
          }

          const data = await response.json();

          document.getElementById("result").textContent = JSON.stringify(
            data,
            null,
            2,
          );

          updateAlertUI(data);
        } catch (error) {
          document.getElementById("result").textContent =
            "Error: " + error.message;
        }
      }

      function updateAlertUI(data) {
        const alertBox = document.getElementById("alertBox");
        const explanation = document.getElementById("explanationText");
        const ackButton = document.getElementById("ackButton");

        alertBox.innerHTML = "";
        explanation.innerText = "";
        ackButton.style.display = "none";

        if (!data.alert || !data.alert.alert) {
          alertBox.innerHTML =
            "<div class='alert resolved'>No active alerts</div>";
          return;
        }

        if (data.alert.level === "HIGH") {
          alertBox.innerHTML =
            "<div class='alert high'>HIGH ALERT: Patient showing elevated risk</div>";

          ackButton.style.display = "inline";
        }

        if (data.alert.level === "CRITICAL") {
          alertBox.innerHTML =
            "<div class='alert critical'>CRITICAL ALERT: Immediate attention required</div>";

          ackButton.style.display = "inline";
        }

        if (data.explanation) {
          explanation.innerText = data.explanation;
        }
      }

      async function acknowledgeAlert() {
        const patientId = document.getElementById("patientId").value;

        // FIX 4: Use doctor name from input field instead of hardcoded value
        const doctorName = document.getElementById("doctorName").value.trim();
        if (!doctorName) {
          alert("Please enter a doctor name before acknowledging.");
          return;
        }

        const url = `http://localhost:8000/api/v1/patients/${patientId}/acknowledge?doctor=${encodeURIComponent(doctorName)}`;

        try {
          const response = await fetch(url, {
            method: "POST",
          });

          // FIX 1: Check response.ok before confirming success
          if (!response.ok) {
            const err = await response.json();
            throw new Error(err.detail || "Server error " + response.status);
          }

          alert("Alert acknowledged");

          fetchPrediction();
        } catch (error) {
          alert("Acknowledgement failed: " + error.message);
        }
      }

      async function uploadCSV() {
        const fileInput = document.getElementById("csvFile");
        const file = fileInput.files[0];

        if (!file) {
          alert("Please select a CSV file");
          return;
        }

        const formData = new FormData();
        formData.append("file", file);

        try {
          const response = await fetch(
            "http://localhost:8000/api/v1/upload-csv",
            {
              method: "POST",
              body: formData,
            },
          );

          const data = await response.json();

          // FIX 3: Check response.ok and surface errors clearly
          if (!response.ok) {
            document.getElementById("uploadResult").textContent =
              "Upload error: " + (data.detail || response.status);
            return;
          }

          document.getElementById("uploadResult").textContent = JSON.stringify(
            data,
            null,
            2,
          );
        } catch (error) {
          document.getElementById("uploadResult").textContent =
            "Upload failed: " + error.message;
        }
      }
    </script>
  </body>
</html>
